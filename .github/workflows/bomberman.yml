name: Generate Bomberman Contribution Graph

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate bomberman contribution graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: Rspereiira
          github_token: ${{ secrets.GITHUB_TOKEN }}
          games: "bomberman"
          player_style: "bomberman"

      - name: Push bomberman graph to pacman-output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: pacman-output
          publish_dir: ./dist
